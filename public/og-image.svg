<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060810"/>
      <stop offset="50%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#060810"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f2fe"/>
      <stop offset="100%" style="stop-color:#4facfe"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="30%">
      <stop offset="0%" style="stop-color:rgba(79,172,254,0.15)"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="70%">
      <stop offset="0%" style="stop-color:rgba(255,8,68,0.1)"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Decorative grid lines -->
  <line x1="0" y1="200" x2="1200" y2="200" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="430" x2="1200" y2="430" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Soccer ball -->
  <text x="600" y="220" font-size="80" text-anchor="middle" fill="white" opacity="0.9">⚽</text>

  <!-- Title -->
  <text x="600" y="310" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="bold" text-anchor="middle" fill="white" letter-spacing="4">FANFOLIO</text>

  <!-- Accent line -->
  <rect x="450" y="330" width="300" height="3" rx="2" fill="url(#accent)"/>

  <!-- Subtitle -->
  <text x="600" y="380" font-family="Arial, Helvetica, sans-serif" font-size="28" text-anchor="middle" fill="#94a3b8">Trade World Cup Teams Like Stocks</text>

  <!-- Feature tags -->
  <rect x="280" y="420" width="180" height="40" rx="20" fill="rgba(0,242,254,0.1)" stroke="rgba(0,242,254,0.3)" stroke-width="1"/>
  <text x="370" y="446" font-family="Arial, Helvetica, sans-serif" font-size="14" text-anchor="middle" fill="#00f2fe">Live Trading</text>

  <rect x="510" y="420" width="180" height="40" rx="20" fill="rgba(16,185,129,0.1)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
  <text x="600" y="446" font-family="Arial, Helvetica, sans-serif" font-size="14" text-anchor="middle" fill="#10b981">Real-time Prices</text>

  <rect x="740" y="420" width="180" height="40" rx="20" fill="rgba(168,85,247,0.1)" stroke="rgba(168,85,247,0.3)" stroke-width="1"/>
  <text x="830" y="446" font-family="Arial, Helvetica, sans-serif" font-size="14" text-anchor="middle" fill="#a855f7">Solana Powered</text>

  <!-- URL -->
  <text x="600" y="520" font-family="Arial, Helvetica, sans-serif" font-size="20" text-anchor="middle" fill="#64748b">fanfoliox.vercel.app</text>

  <!-- Bottom accent -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>
</svg>
